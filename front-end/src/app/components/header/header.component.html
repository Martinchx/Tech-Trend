<div class="d-flex justify-content-between bg-dark" data-bs-theme="dark">
  <nav class="navbar navbar-expand-lg sticky-top w-100">
    <div class="container-fluid">
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <a
          class="navbar-brand mt-2 mt-lg-0 me-1 d-none d-lg-block"
          [routerLink]="['/home']"
        >
          <img
            src="../../../assets/logo.png"
            height="45"
            class="rounded"
            alt="Logo"
          />
        </a>
        <ul
          class="navbar-nav me-auto mb-2 mb-lg-0 p-1 text-center justify-content-center"
        >
          <li class="nav-item" [routerLinkActive]="['active']">
            <a
              class="nav-link link-warning text-light"
              [routerLink]="['/home']"
            >
              Home
            </a>
          </li>

          <li class="nav-item" [routerLinkActive]="['active']">
            <a
              class="nav-link link-warning text-light"
              [routerLink]="['/products-list']"
              [queryParams]="{ category: 0 }"
            >
              Products
            </a>
          </li>

          <li class="nav-item dropdown">
            <a
              class="nav-link link-warning text-light dropdown-toggle"
              href="#"
              role="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              Categories
            </a>
            <ul class="dropdown-menu">
              <li class="nav-item" *ngFor="let c of categories">
                <a
                  class="dropdown-item link-warning text-light"
                  [routerLink]="['/products-list']"
                  [queryParams]="{ category: c._id }"
                >
                  {{ c.name }}
                </a>
              </li>
            </ul>
          </li>

          <li
            class="nav-item dropdown"
            *ngIf="isLogged() && isAdmin()"
            [routerLinkActive]="['active']"
          >
            <a
              class="nav-link link-warning text-light dropdown-toggle"
              href="#"
              role="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              Product Management
            </a>
            <ul class="dropdown-menu">
              <li class="nav-item">
                <a
                  class="dropdown-item link-warning text-light"
                  [routerLink]="['/product-form/0']"
                >
                  Create product
                </a>
              </li>
              <li class="nav-item">
                <a
                  class="dropdown-item link-warning text-light"
                  [routerLink]="['/products']"
                >
                  List
                </a>
              </li>
            </ul>
          </li>

          <li
            class="nav-item dropdown"
            *ngIf="isLogged() && isAdmin()"
            [routerLinkActive]="['active']"
          >
            <a
              class="nav-link link-warning text-light dropdown-toggle"
              href="#"
              role="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              Category Management
            </a>
            <ul class="dropdown-menu">
              <li class="nav-item">
                <a
                  class="dropdown-item link-warning text-light"
                  [routerLink]="['/category-form/0']"
                >
                  Create category
                </a>
              </li>
              <li class="nav-item">
                <a
                  class="dropdown-item link-warning text-light"
                  [routerLink]="['/categories']"
                >
                  List
                </a>
              </li>
            </ul>
          </li>

          <li
            class="nav-item"
            *ngIf="isLogged() && isAdmin()"
            [routerLinkActive]="['active']"
          >
            <a
              class="nav-link link-warning text-light"
              [routerLink]="['/users']"
            >
              User Management
            </a>
          </li>

          <li
            class="nav-item"
            *ngIf="isLogged() && !isAdmin()"
            [routerLinkActive]="['active']"
          >
            <a
              class="nav-link link-warning text-light"
              [routerLink]="['/my-orders']"
            >
              My Orders
            </a>
          </li>

          <li
            class="nav-item"
            *ngIf="isLogged() && isAdmin()"
            [routerLinkActive]="['active']"
          >
            <a
              class="nav-link link-warning text-light"
              [routerLink]="['/orders']"
            >
              Orders
            </a>
          </li>
        </ul>

        <!-- MOBILE -->

        <div class="d-flex align-items-center justify-content-center">
          <a
            class="d-lg-none mx-2"
            *ngIf="isLogged() && !isAdmin()"
            [routerLink]="['/shopping-car']"
          >
            <i class="fas fa-shopping-cart fa-lg" style="color: #fff"></i>
          </a>

          <div class="dropdown d-lg-none">
            <a
              class="btn btn-dark dropdown-toggle"
              href="#"
              id="navbarDropdownMenuAvatar"
              role="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              <i class="fas fa-user-circle fa-xl"></i>
            </a>
            <ul
              class="dropdown-menu dropdown-menu-start bg-dark"
              aria-labelledby="navbarDropdownMenuAvatar"
            >
              <li *ngIf="!isLogged()">
                <a
                  class="dropdown-item link-warning text-white"
                  [routerLink]="['/login']"
                >
                  <i class="fas fa-sign-in-alt"></i>
                  Login
                </a>
              </li>
              <li *ngIf="isLogged()">
                <a
                  class="dropdown-item link-warning text-white"
                  [routerLink]="['/home']"
                  (click)="logout()"
                >
                  <i class="fas fa-sign-out-alt"></i>
                  Logout
                </a>
              </li>
              <li *ngIf="!isLogged()">
                <a
                  class="dropdown-item link-warning text-white"
                  [routerLink]="['/signup']"
                >
                  <i class="fas fa-user-plus"></i>
                  Signup
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <!-- PC -->

      <div class="d-flex align-items-center">
        <a
          class="me-3 d-none d-lg-block"
          *ngIf="isLogged() && !isAdmin()"
          [routerLink]="['/shopping-car']"
        >
          <i class="fas fa-shopping-cart fa-lg" style="color: #fff"></i>
        </a>

        <div class="dropdown d-none d-lg-block">
          <a
            class="btn btn-dark dropdown-toggle"
            href="#"
            id="navbarDropdownMenuAvatar"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            <i class="fas fa-user-circle fa-xl"></i>
          </a>
          <ul
            class="dropdown-menu dropdown-menu-end bg-dark"
            aria-labelledby="navbarDropdownMenuAvatar"
          >
            <li *ngIf="!isLogged()">
              <a
                class="dropdown-item link-warning text-white"
                [routerLink]="['/login']"
              >
                <i class="fas fa-sign-in-alt"></i>
                Login
              </a>
            </li>
            <li *ngIf="isLogged()">
              <a
                class="dropdown-item link-warning text-white"
                [routerLink]="['/home']"
                (click)="logout()"
              >
                <i class="fas fa-sign-out-alt"></i>
                Logout
              </a>
            </li>
            <li *ngIf="!isLogged()">
              <a
                class="dropdown-item link-warning text-white"
                [routerLink]="['/signup']"
              >
                <i class="fas fa-user-plus"></i>
                Signup
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
</div>
